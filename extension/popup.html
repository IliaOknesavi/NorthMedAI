<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthMedAI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg:        #0f1117;
      --surface:   #161b22;
      --surface-2: #1e242c;
      --border:    #2d333b;
      --text:      #e6edf3;
      --muted:     #8b949e;
      --muted-2:   #5c6570;

      --accent:    #2f81f7;
      --accent-2:  #1f6feb;
      --good:      #3fb950;
      --warn:      #d29922;
      --bad:       #f85149;
      --purple:    #bc8cff;
    }

    body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans", sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }

    .logo-img {
    width: 70px;
    height: 70px;
    border-radius: 8px;   /* можно чуть больше скругление */
    object-fit: contain;
    }

    .header {
    display: flex;
    align-items: center;
    gap: 6px;            /* было 10px – увеличиваем под лого */
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
    }
    .header-text {
      flex: 1;
    }
    .title {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.2px;
    }
    .subtitle {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }
    .header-actions {
      display: flex;
      gap: 6px;
      align-items: center;
    }
    .icon-btn {
      background: transparent;
      border: none;
      cursor: pointer;
      padding: 4px;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      transition: all 0.2s;
      font-size: 15px;
      font-weight: 500;
    }
    .icon-btn:hover {
      background: var(--surface-2);
      color: var(--text);
    }

    /* Основное содержимое */
    .body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    /* Статус-карточка */
    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: border-color 0.2s;
    }
    .status-card.on {
      border-color: rgba(63, 185, 80, 0.3);
      background: linear-gradient(180deg, rgba(63,185,80,0.08), transparent 70%), var(--surface);
    }
    .status-card.off {
      opacity: 0.85;
    }
    .status-card.checking {
      border-color: rgba(47, 129, 247, 0.4);
    }
    .status-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--muted-2);
    }
    .status-card.on .status-dot {
      background: var(--good);
      box-shadow: 0 0 8px var(--good);
    }
    .status-card.checking .status-icon::after {
      content: "";
      position: absolute;
      inset: -3px;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .status-text {
      flex: 1;
    }
    .status-title {
      font-size: 14px;
      font-weight: 600;
    }
    .status-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* Свитч */
    .switch {
      position: relative;
      width: 36px;
      height: 20px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: #2d333b;
      border-radius: 20px;
      transition: background 0.2s;
    }
    .slider::before {
      content: "";
      position: absolute;
      width: 14px;
      height: 14px;
      left: 3px;
      top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    .switch input:checked + .slider {
      background: var(--accent);
    }
    .switch input:checked + .slider::before {
      transform: translateX(16px);
    }
    .switch input:disabled + .slider {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Три плитки */
    .tiles {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px 6px;
      text-align: center;
    }
    .tile-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    .tile-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      display: inline-block;
    }
    .tile.false .tile-dot { background: var(--bad); }
    .tile.disputed .tile-dot { background: var(--warn); }
    .tile.sophism .tile-dot { background: var(--purple); }
    .tile-value {
      font-size: 24px;
      font-weight: 700;
      margin-top: 4px;
      line-height: 1.2;
    }
    .tile.zero .tile-value {
      color: var(--muted-2);
      font-weight: 500;
    }

    /* Блок тумблеров (тики, голос) */
    .toggles {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child {
      border-bottom: none;
    }
    .toggle-label {
      font-weight: 500;
    }
    .toggle-sub {
      font-size: 10px;
      color: var(--muted);
      margin-top: 2px;
    }
    .badge-soon {
      font-size: 9px;
      font-weight: 600;
      background: var(--surface-2);
      padding: 2px 6px;
      border-radius: 12px;
      color: var(--muted);
      margin-left: 6px;
      text-transform: uppercase;
    }

    /* Кнопки действия */
    .actions {
      display: flex;
      gap: 10px;
    }
    .btn {
      flex: 1;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid transparent;
      cursor: pointer;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    .btn-primary {
      background: var(--accent);
      color: white;
    }
    .btn-primary:hover {
      background: var(--accent-2);
    }
    .btn-secondary {
      background: var(--surface);
      border-color: var(--border);
      color: var(--text);
    }
    .btn-secondary:hover {
      background: var(--surface-2);
    }
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Панель настроек (без бэкенда) */
    .settings-panel {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
      z-index: 10;
    }
    .settings-panel.open {
      display: flex;
    }
    .settings-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .back-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 18px;
      cursor: pointer;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .back-btn:hover {
      background: var(--surface-2);
    }
    .settings-title {
      font-size: 14px;
      font-weight: 600;
    }
    .settings-body {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 18px;
    }
    .field label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: block;
      margin-bottom: 6px;
    }
    .lang-row {
      display: flex;
      gap: 8px;
    }
    .lang-chip {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
      transition: all 0.15s;
    }
    .lang-chip.active {
      background: rgba(47, 129, 247, 0.15);
      border-color: var(--accent);
      color: var(--accent);
    }
    .about {
      margin-top: 8px;
      font-size: 10px;
      text-align: center;
      color: var(--muted-2);
    }
    #root {
      position: relative;
    }
  </style>
</head>
<body>
<div id="root">
  <!-- Главный вид -->
  <div id="main-view">
    <div class="header">
      <!-- Логотип из изображения -->
      <img class="logo-img" src="logo.png" alt="NorthMedAI">
      <div class="header-text">
        <div class="title">NorthMedAI</div>
        <div class="subtitle" data-i18n="subtitle"></div>
      </div>
      <div class="header-actions">
        <button class="icon-btn" id="theme-header-btn" title="Сменить тему">🌓</button>
        <button class="icon-btn" id="settings-header-btn" title="Настройки">⚙</button>
      </div>
    </div>

    <div class="body">
      <div class="status-card" id="status-card">
        <div class="status-icon"><div class="status-dot"></div></div>
        <div class="status-text">
          <div class="status-title" id="status-title">…</div>
          <div class="status-sub" id="status-sub">…</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="enabled-toggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="tiles">
        <div class="tile false zero">
          <div class="tile-label"><span class="tile-dot"></span> <span data-i18n="tile_false"></span></div>
          <div class="tile-value" id="count-false">0</div>
        </div>
        <div class="tile disputed zero">
          <div class="tile-label"><span class="tile-dot"></span> <span data-i18n="tile_disputed"></span></div>
          <div class="tile-value" id="count-disputed">0</div>
        </div>
        <div class="tile sophism zero">
          <div class="tile-label"><span class="tile-dot"></span> <span data-i18n="tile_sophism"></span></div>
          <div class="tile-value" id="count-sophism">0</div>
        </div>
      </div>

      <div class="toggles">
        <div class="toggle-row">
          <div>
            <div class="toggle-label" data-i18n="toggle_ticks"></div>
          </div>
          <label class="switch">
            <input type="checkbox" id="ticks-toggle">
            <span class="slider"></span>
          </label>
        </div>
        <div class="toggle-row">
          <div>
            <div class="toggle-label" data-i18n="toggle_voice"></div>
          </div>
          <label class="switch">
            <input type="checkbox" id="voice-toggle">
            <span class="slider"></span>
          </label>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-secondary" id="recheck-btn" data-i18n-title="btn_recheck_hint">
          <span data-i18n="btn_recheck"></span>
        </button>
      </div>
    </div>
  </div>

  <!-- Панель настроек (только язык и сброс) -->
  <div class="settings-panel" id="settings-view">
    <div class="settings-header">
      <button class="back-btn" id="back-btn">←</button>
      <div class="settings-title" data-i18n="settings_title"></div>
    </div>
    <div class="settings-body">
      <div class="field">
        <label data-i18n="lang_label"></label>
        <div class="lang-row">
          <button class="lang-chip" data-lang="ru" data-i18n="lang_ru"></button>
          <button class="lang-chip" data-lang="en" data-i18n="lang_en"></button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="reset_label"></label>
        <button class="btn-secondary" id="reset-btn" style="width:100%" data-i18n="reset_btn"></button>
      </div>
      <div class="about" data-i18n="about"></div>
    </div>
  </div>
</div>
<script src="i18n.js"></script>
<script src="popup.js"></script>
</body>
</html>
