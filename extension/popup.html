<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NorthMedAI</title>
  <style>
    :root {
      --bg:        #0d1018;
      --surface:   #131722;
      --surface-2: #1a1f2c;
      --border:    #242a38;
      --text:      #e8eaed;
      --muted:     #8a90a0;
      --muted-2:   #5b6172;

      --accent:    #4f8ef7;
      --accent-2:  #3d7de8;
      --good:      #66d9b1;
      --warn:      #fdd663;
      --bad:       #f28b82;
      --purple:    #b794f6;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 340px;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "SF Pro Text", sans-serif;
      font-size: 13px;
      line-height: 1.4;
    }

    /* ─── Header ─────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: linear-gradient(135deg, #4f8ef7, #66d9b1);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      flex-shrink: 0;
    }
    .header-text { display: flex; flex-direction: column; gap: 2px; }
    .title    { font-size: 14px; font-weight: 600; color: #fff; }
    .subtitle { font-size: 11px; color: var(--muted); }

    /* ─── Status card ─────────────────────────────────────────────────────── */
    .body {
      padding: 14px 16px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .status-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .status-card.on { border-color: rgba(102, 217, 177, 0.3); background: linear-gradient(180deg, rgba(102,217,177,0.08), transparent 70%), var(--surface); }
    .status-card.off { opacity: 0.85; }
    .status-card.checking { border-color: rgba(79,142,247,0.35); }

    .status-icon {
      width: 36px; height: 36px;
      border-radius: 50%;
      background: var(--surface-2);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      position: relative;
    }
    .status-icon .dot {
      width: 10px; height: 10px; border-radius: 50%;
      background: var(--muted-2);
    }
    .status-card.on  .status-icon .dot { background: var(--good); box-shadow: 0 0 8px rgba(102,217,177,0.6); }
    .status-card.checking .status-icon::after {
      content: ""; position: absolute; inset: -3px;
      border: 2px solid transparent;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .status-text { flex: 1; min-width: 0; }
    .status-title { font-size: 13px; font-weight: 600; color: #fff; }
    .status-sub   { font-size: 11px; color: var(--muted); margin-top: 2px; }

    /* ─── Switch (общий компонент) ────────────────────────────────────────── */
    .switch { position: relative; width: 38px; height: 22px; flex-shrink: 0; cursor: pointer; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute; inset: 0;
      background: #2b3140;
      border-radius: 22px;
      transition: background 0.2s;
    }
    .slider::before {
      content: ""; position: absolute;
      width: 16px; height: 16px;
      left: 3px; top: 3px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.2s, background 0.2s;
    }
    .switch input:checked + .slider { background: var(--accent); }
    .switch input:checked + .slider::before { transform: translateX(16px); }
    .switch input:disabled + .slider { opacity: 0.5; cursor: not-allowed; }

    /* ─── Tiles ───────────────────────────────────────────────────────────── */
    .tiles {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .tile {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .tile .tile-label {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex; align-items: center; gap: 5px;
    }
    .tile .dot {
      width: 6px; height: 6px; border-radius: 50%;
    }
    .tile.false   .dot { background: var(--bad); }
    .tile.disputed .dot { background: var(--warn); }
    .tile.sophism .dot { background: var(--purple); }
    .tile .tile-value {
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      line-height: 1.1;
    }
    .tile.zero .tile-value { color: var(--muted-2); font-weight: 600; }

    /* ─── Toggles section ────────────────────────────────────────────────── */
    .toggles {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 11px 14px;
      border-bottom: 1px solid var(--border);
    }
    .toggle-row:last-child { border-bottom: none; }
    .toggle-row .label-block { flex: 1; min-width: 0; }
    .toggle-row .lbl { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 6px; }
    .toggle-row .sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

    .badge-soon {
      display: inline-block;
      font-size: 9px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 2px 5px;
      border-radius: 4px;
      background: var(--surface-2);
      color: var(--muted);
    }

    /* ─── Buttons ─────────────────────────────────────────────────────────── */
    .actions { display: flex; gap: 8px; }
    .btn {
      flex: 1;
      font: inherit;
      font-weight: 600;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s, border-color 0.15s;
      border: 1px solid transparent;
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    }
    .btn.primary  { background: var(--accent); color: #fff; }
    .btn.primary:hover { background: var(--accent-2); }
    .btn.ghost    { background: var(--surface); color: var(--text); border-color: var(--border); }
    .btn.ghost:hover { background: var(--surface-2); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* ─── Settings panel (выезжает поверх) ───────────────────────────────── */
    .settings-panel {
      position: absolute;
      inset: 0;
      background: var(--bg);
      display: none;
      flex-direction: column;
    }
    .settings-panel.open { display: flex; }

    .settings-header {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
    }
    .settings-header .back-btn {
      width: 28px; height: 28px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font: inherit; font-size: 16px;
    }
    .settings-header .back-btn:hover { background: var(--surface-2); }
    .settings-title { font-size: 14px; font-weight: 600; color: #fff; }

    .settings-body {
      padding: 14px 16px;
      display: flex; flex-direction: column; gap: 14px;
      overflow-y: auto;
    }

    .field { display: flex; flex-direction: column; gap: 6px; }
    .field label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .field-hint { font-size: 11px; color: var(--muted-2); }

    .lang-row { display: flex; gap: 8px; }
    .lang-chip {
      flex: 1;
      padding: 8px 10px;
      border-radius: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font: inherit; font-size: 12px; font-weight: 600;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .lang-chip:hover { background: var(--surface-2); }
    .lang-chip.active {
      background: rgba(79,142,247,0.15);
      border-color: var(--accent);
      color: #fff;
    }

    input.text-input {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font: inherit; font-size: 12px;
      padding: 8px 10px;
      outline: none;
    }
    input.text-input:focus { border-color: var(--accent); }

    .about {
      margin-top: auto;
      padding-top: 16px;
      font-size: 11px;
      color: var(--muted-2);
      text-align: center;
    }

    /* Корневой контейнер становится position: relative — чтобы settings-panel мог быть absolute */
    #root { position: relative; min-height: 100%; }
  </style>
</head>
<body>
  <div id="root">

    <!-- ─── Main view ──────────────────────────────────────────────────── -->
    <div id="main-view">
      <div class="header">
        <div class="logo">🧬</div>
        <div class="header-text">
          <div class="title">NorthMedAI</div>
          <div class="subtitle" data-i18n="subtitle"></div>
        </div>
      </div>

      <div class="body">
        <!-- Карточка статуса с главным тумблером -->
        <div class="status-card" id="status-card">
          <div class="status-icon"><div class="dot"></div></div>
          <div class="status-text">
            <div class="status-title" id="status-title">…</div>
            <div class="status-sub" id="status-sub">…</div>
          </div>
          <label class="switch">
            <input type="checkbox" id="enabled-toggle" />
            <span class="slider"></span>
          </label>
        </div>

        <!-- 3 плитки со статистикой -->
        <div class="tiles">
          <div class="tile false zero">
            <div class="tile-label"><span class="dot"></span><span data-i18n="tile_false"></span></div>
            <div class="tile-value" id="count-false">0</div>
          </div>
          <div class="tile disputed zero">
            <div class="tile-label"><span class="dot"></span><span data-i18n="tile_disputed"></span></div>
            <div class="tile-value" id="count-disputed">0</div>
          </div>
          <div class="tile sophism zero">
            <div class="tile-label"><span class="dot"></span><span data-i18n="tile_sophism"></span></div>
            <div class="tile-value" id="count-sophism">0</div>
          </div>
        </div>

        <!-- Тумблеры -->
        <div class="toggles">
          <div class="toggle-row">
            <div class="label-block">
              <div class="lbl" data-i18n="toggle_ticks"></div>
            </div>
            <label class="switch">
              <input type="checkbox" id="ticks-toggle" />
              <span class="slider"></span>
            </label>
          </div>
          <div class="toggle-row">
            <div class="label-block">
              <div class="lbl">
                <span data-i18n="toggle_voice"></span>
              </div>
            </div>
            <label class="switch">
              <input type="checkbox" id="voice-toggle" />
              <span class="slider"></span>
            </label>
          </div>
        </div>

        <!-- Кнопки -->
        <div class="actions">
          <button class="btn ghost" id="settings-btn">
            <span>⚙</span><span data-i18n="btn_settings"></span>
          </button>
          <button class="btn primary" id="recheck-btn" data-i18n-title="btn_recheck_hint">
            <span data-i18n="btn_recheck"></span>
          </button>
        </div>
      </div>
    </div>

    <!-- ─── Settings view ──────────────────────────────────────────────── -->
    <div class="settings-panel" id="settings-view">
      <div class="settings-header">
        <button class="back-btn" id="back-btn">‹</button>
        <div class="settings-title" data-i18n="settings_title"></div>
      </div>
      <div class="settings-body">
        <div class="field">
          <label data-i18n="lang_label"></label>
          <div class="lang-row">
            <button class="lang-chip" data-lang="ru" data-i18n="lang_ru"></button>
            <button class="lang-chip" data-lang="en" data-i18n="lang_en"></button>
          </div>
        </div>

        <div class="field">
          <label data-i18n="backend_label"></label>
          <input class="text-input" id="backend-input" type="text" placeholder="http://localhost:8000" />
          <div class="field-hint" data-i18n="backend_hint"></div>
        </div>

        <div class="field">
          <label data-i18n="reset_label"></label>
          <button class="btn ghost" id="reset-btn" data-i18n="reset_btn"></button>
        </div>

        <div class="about" data-i18n="about"></div>
      </div>
    </div>

  </div>

  <script src="i18n.js"></script>
  <script src="popup.js"></script>
</body>
</html>
