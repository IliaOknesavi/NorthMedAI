services:
  postgres:
    image: postgres:16-alpine
    container_name: nmai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nmai
      POSTGRES_PASSWORD: nmai
      POSTGRES_DB: nmai
    ports:
      - "5432:5432"
    volumes:
      - nmai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmai -d nmai"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nmai_pgdata:
