services:
  postgres:
    # pgvector расширение нужно для локального RAG (см. agents/sources/corpus.py
    # и docs/RAG_ARCHITECTURE.md §9.3). Image имеет всё что есть в постгрес 16
    # плюс предустановленное расширение vector. Если переключаешься на старый
    # postgres:16-alpine — RAG-таблицы не создадутся, миграция M0003 упадёт с
    # warning, но pipeline продолжит работать (PubMed + whitelist'ы — без RAG).
    image: pgvector/pgvector:pg16
    container_name: nmai-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nmai
      POSTGRES_PASSWORD: nmai
      POSTGRES_DB: nmai
    ports:
      - "5432:5432"
    volumes:
      - nmai_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nmai -d nmai"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  nmai_pgdata:
